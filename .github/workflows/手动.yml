name: 手动更新CM明文

on:
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1 # 只需要最新版本即可

    - name: Check and Download Worker
      run: |
        REPO="cmliu/edgetunnel"
        FILE_PATH="_worker.js"
        TARGET_FILE="明文源码.js"

        echo "===== 1. 检查远程文件属性（时间与 Hash） ====="
        # 获取远程文件的最后提交数据
        API_RESPONSE=$(curl -s "https://api.github.com/repos/$REPO/commits?path=$FILE_PATH&page=1&per_page=1")
        
        # 检查 GitHub API 返回的是否是合法的 JSON 数组
        if ! echo "$API_RESPONSE" | jq -e 'type == "array"' > /dev/null; then
          echo "错误：GitHub API 请求失败，返回内容非数组。可能触发了速率限制或路径错误。"
          echo "API 返回原始信息如下："
          echo "$API_RESPONSE"
          exit 1
        fi

        # 检查数组是否为空（文件可能不存在）
        if [ "$(echo "$API_RESPONSE" | jq 'length')" -eq 0 ]; then
          echo "错误：在该仓库中未找到文件 $FILE_PATH 的提交记录。"
          exit 1
        fi

        # 1. 获取远程文件的最后提交时间
        COMMIT_TIME_STR=$(echo "$API_RESPONSE" | jq -r '.[0].commit.committer.date')
        if [ "$COMMIT_TIME_STR" = "null" ] || [ -z "$COMMIT_TIME_STR" ]; then
          echo "错误：无法解析远程提交时间。"
          exit 1
        fi

        # 2. 获取远程文件的 Git Blob SHA (这是 GitHub 原生提供的文件唯一 Hash 标识，不需要下载即可对比)
        # 注意：若单次 Commit 改变了多个文件，此处需要精确定位当前 path 的文件的 SHA，但通过 commits 接口获取需要解析树。
        # 为了万无一失且100%准确，我们直接通过 Repository Contents API 获取权威远程 Hash：
        CONTENT_API=$(curl -s "https://api.github.com/repos/$REPO/contents/$FILE_PATH")
        REMOTE_GIT_SHA=$(echo "$CONTENT_API" | jq -r '.sha')

        if [ "$REMOTE_GIT_SHA" = "null" ] || [ -z "$REMOTE_GIT_SHA" ]; then
          echo "错误：无法从 GitHub API 获取远程文件的 Git SHA。"
          exit 1
        fi

        # 3. 获取本地库中原本旧文件的 Git SHA (直接用 git rev-parse，不需要算 sha256，与 GitHub API 完全对齐)
        LOCAL_GIT_SHA=$(git rev-parse HEAD:"$TARGET_FILE" 2>/dev/null || echo "")

        # 4. 计算时间差 48小时
        COMMIT_TIMESTAMP=$(date -d "$COMMIT_TIME_STR" +%s)
        CURRENT_TIMESTAMP=$(date +%s)
        TIME_DIFF=$((CURRENT_TIMESTAMP - COMMIT_TIMESTAMP))
        ONE_DAY_SECONDS=1

        echo "远程文件最后更新时间: $COMMIT_TIME_STR"
        echo "时间差: $((TIME_DIFF / 3600)) 小时"
        echo "权威远程 Git SHA: $REMOTE_GIT_SHA"
        echo "本库当前 Git SHA: ${LOCAL_GIT_SHA:-'无旧文件(首次初始化)'}"

        # ===== 核心条件联合判断 =====
        # 条件 A：Hash 是否相同
        HASH_CHANGED=true
        if [ "$REMOTE_GIT_SHA" = "$LOCAL_GIT_SHA" ]; then
          HASH_CHANGED=false
        fi

        # 条件 B：时间差是否大于 24 小时
        TIME_PASSED_24H=true
        if [ $TIME_DIFF -le $ONE_DAY_SECONDS ]; then
          TIME_PASSED_24H=false
        fi

        # 必须同时满足：Hash 改变了 且 时间差大于 24 小时
        if [ "$HASH_CHANGED" = "true" ] && [ "$TIME_PASSED_24H" = "true" ]; then
          echo "[准入通过] 同时满足：远程文件已更新，且更新已超过 24 小时。开始执行下载流程..."
        else
          echo "========================================================"
          echo "提示：不满足同步触发条件！"
          [ "$HASH_CHANGED" = "false" ] && echo " - [未执行原因] 远程文件与本地库文件 Hash 一致，内容无变化。"
          [ "$TIME_PASSED_24H" = "false" ] && echo " - [未执行原因] 远程文件更新时间未超过 24 小时 (沉淀时间不足)。"
          echo "========================================================"
          exit 0
        fi

        echo "===== 2. 开始下载与流损坏校验 ====="
        # 我们用 GitHub 原生的 SHA 来进行文件完整性校验
        RAW_URL="https://raw.githubusercontent.com/$REPO/main/$FILE_PATH"
        LOOP_COUNT=0
        SUCCESS=false

        while [ $LOOP_COUNT -lt 3 ]; do
          LOOP_COUNT=$((LOOP_COUNT + 1))
          echo "--> [第 $LOOP_COUNT 次尝试] 正在下载文件..."

          DOWNLOAD_RETRY=0
          DOWNLOAD_SUCCESS=false
          while [ $DOWNLOAD_RETRY -lt 3 ]; do
            DOWNLOAD_RETRY=$((DOWNLOAD_RETRY + 1))
            if curl -sS --connect-timeout 10 --max-time 30 "$RAW_URL" -o "$TARGET_FILE"; then
              DOWNLOAD_SUCCESS=true
              break
            else
              echo "    警告: 下载失败，3秒后进行第 $DOWNLOAD_RETRY 次下载重试..."
              sleep 3
            fi
          done

          if [ "$DOWNLOAD_SUCCESS" = "false" ]; then
            echo "错误: 下载重试 3 次后依然失败，退出工作流。"
            exit 1
          fi

          # 计算刚下载下来的本地文件的 Git Blob SHA (注意：git hash-object 计算出的值与 GitHub API 的 .sha 完美对应)
          DOWNLOADED_SHA=$(git hash-object "$TARGET_FILE")
          echo "    下载成功。刚下载文件的 Git SHA: $DOWNLOADED_SHA"

          if [ "$DOWNLOADED_SHA" = "$REMOTE_GIT_SHA" ]; then
            echo "    [验证通过] 下载的文件与远程权威 Hash 一致，未发生传输损坏。"
            SUCCESS=true
            break
          else
            echo "    [验证失败] 下载的文件 Hash 与远程不一致！可能下载过程中数据损坏。"
            if [ $LOOP_COUNT -lt 3 ]; then
              echo "    准备重新下载并重新比对..."
              sleep 5
            fi
          fi
        done

        if [ "$SUCCESS" = "false" ]; then
          echo "错误: 重试 3 次后，下载的文件 Hash 始终损坏，放弃提交。"
          exit 1
        fi

        # 允许通过所有验证，传递变量给下一步执行 Commit
        echo "SHOULD_COMMIT=true" >> $GITHUB_ENV

    - name: Commit and Push Changes
      if: env.SHOULD_COMMIT == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add 明文源码.js
        git commit -m "chore: auto-update _worker.js from cmliu/edgetunnel"
        git push
        echo "同步成功，新文件已推送到仓库。"
